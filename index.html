
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeshAid | Tactical Disaster Response</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700;800&family=Bebas+Neue&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-tactical: #040508;
      --bg-tactical-surface: #0a0c12;
      --bg-overlay: rgba(0, 0, 0, 0.8);
      --accent-sos: #ff2e2e;
      --accent-medical: #3b82f6;
      --accent-resource: #00f5a0;
      --accent-alert: #fb923c;
      --accent-info: #6366f1;
      --gradient-primary: linear-gradient(135deg, #00f5a0 0%, #00d9ff 100%);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-bg: rgba(15, 20, 30, 0.6);
      --text-primary: #f0f2f5;
      --sidebar-fade: linear-gradient(to top, #08090d 0%, #08090d 65%, transparent 100%);
    }

    body {
      background-color: var(--bg-tactical);
      color: var(--text-primary);
      font-family: 'Space Grotesk', sans-serif;
      margin: 0;
      overflow: hidden;
      letter-spacing: -0.01em;
      transition: background-color 0.35s ease, color 0.35s ease;
    }

    body.theme-light {
      --bg-tactical: #e9f2ff;
      --bg-tactical-surface: #f5f9ff;
      --bg-overlay: rgba(15, 23, 42, 0.28);
      --glass-border: rgba(76, 94, 165, 0.22);
      --glass-bg: rgba(255, 255, 255, 0.76);
      --text-primary: #081124;
      --sidebar-fade: linear-gradient(to top, rgba(248, 251, 255, 0.98) 0%, rgba(248, 251, 255, 0.9) 60%, transparent 100%);
    }

    .mono { font-family: 'JetBrains Mono', monospace; }
    .heading { font-family: 'Bebas Neue', cursive; letter-spacing: 0.08em; }
    
    .text-gradient {
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Tactical Background Elements */
    .bg-grid {
      background-image: 
        linear-gradient(rgba(0, 245, 160, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 245, 160, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      position: relative;
    }

    .bg-grid::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 100;
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
      opacity: 0.05;
    }

    body.theme-light .bg-grid {
      background-image:
        linear-gradient(rgba(59, 130, 246, 0.11) 1px, transparent 1px),
        linear-gradient(90deg, rgba(16, 185, 129, 0.11) 1px, transparent 1px);
    }

    body.theme-light .bg-grid::after {
      opacity: 0.08;
      background: linear-gradient(rgba(255, 255, 255, 0) 50%, rgba(0, 0, 0, 0.06) 50%), linear-gradient(90deg, rgba(59, 130, 246, 0.1), rgba(0, 245, 160, 0.08), rgba(99, 102, 241, 0.1));
    }

    /* Improved Glass UI */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: none;
      border: 1px solid var(--glass-border);
      box-shadow: 0 6px 20px 0 rgba(0, 0, 0, 0.45);
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: none;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .glass-card:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }

    .app-shell { background: var(--bg-tactical); }
    .sidebar-shell { background: var(--bg-tactical-surface); }
    .header-shell { background: color-mix(in srgb, var(--bg-tactical-surface) 84%, transparent); }
    .app-overlay { background: var(--bg-overlay); }
    .sidebar-fade { background: var(--sidebar-fade); }

    body.theme-light .app-shell {
      background:
        radial-gradient(circle at 8% 12%, rgba(16, 185, 129, 0.14), transparent 34%),
        radial-gradient(circle at 90% 10%, rgba(99, 102, 241, 0.14), transparent 32%),
        radial-gradient(circle at 60% 78%, rgba(56, 189, 248, 0.12), transparent 38%),
        var(--bg-tactical);
    }

    body.theme-light .sidebar-shell {
      background:
        linear-gradient(155deg, rgba(255, 255, 255, 0.82), rgba(236, 246, 255, 0.8)),
        var(--bg-tactical-surface);
      border-right-color: rgba(99, 102, 241, 0.14) !important;
    }

    body.theme-light .header-shell {
      background:
        linear-gradient(120deg, rgba(255, 255, 255, 0.75), rgba(229, 244, 255, 0.74), rgba(237, 255, 247, 0.7));
      border-bottom-color: rgba(99, 102, 241, 0.16) !important;
    }

    .theme-toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 0.8rem;
      border-radius: 999px;
      border: 1px solid color-mix(in srgb, var(--glass-border) 70%, transparent);
      background: color-mix(in srgb, var(--glass-bg) 60%, transparent);
      color: var(--text-primary);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      backdrop-filter: none;
      transition: all 0.25s ease;
    }
    .theme-toggle:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--accent-resource) 45%, var(--glass-border));
      box-shadow: 0 12px 28px rgba(0, 245, 160, 0.18);
    }

    body.theme-light .theme-toggle {
      box-shadow: 0 12px 24px rgba(8, 17, 36, 0.12);
    }

    /* Neon Accents */
    .glow-sos { box-shadow: 0 0 30px rgba(255, 46, 46, 0.15); border: 1px solid rgba(255, 46, 46, 0.3); }
    .glow-medical { box-shadow: 0 0 30px rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.3); }
    .glow-resource { box-shadow: 0 0 30px rgba(0, 245, 160, 0.15); border: 1px solid rgba(0, 245, 160, 0.3); }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0, 245, 160, 0.2); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0, 245, 160, 0.4); }

    @keyframes pulse-red {
      0%, 100% { opacity: 1; border-color: rgba(255, 46, 46, 0.45); }
      50% { opacity: 0.85; border-color: rgba(255, 46, 46, 0.8); }
    }
    .animate-pulse-sos { animation: pulse-red 2s infinite ease-in-out; }

    .tactical-border {
      position: relative;
    }
    .tactical-border::before, .tactical-border::after {
      content: "";
      position: absolute;
      width: 10px;
      height: 10px;
      border-color: rgba(255,255,255,0.3);
      pointer-events: none;
    }
    .tactical-border::before { top: 0; left: 0; border-top: 1px solid; border-left: 1px solid; }
    .tactical-border::after { bottom: 0; right: 0; border-bottom: 1px solid; border-right: 1px solid; }

    @keyframes scanner {
      0% { transform: translate3d(0, -110%, 0); }
      100% { transform: translate3d(0, 110vh, 0); }
    }
    .scan-line {
      position: absolute;
      top: 0;
      height: 5px;
      width: 100%;
      background: linear-gradient(to bottom, transparent, rgba(0, 245, 160, 0.1), transparent);
      animation: none;
      z-index: 10;
      pointer-events: none;
      will-change: transform;
      opacity: 0.25;
    }

    body.theme-light .scan-line {
      background: linear-gradient(to bottom, transparent, rgba(59, 130, 246, 0.12), transparent);
      opacity: 0.7;
    }

    body.theme-light .glass-card {
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.62), rgba(225, 236, 255, 0.42));
      border: 1px solid rgba(99, 102, 241, 0.18);
      box-shadow: 0 14px 28px -22px rgba(59, 130, 246, 0.45);
    }
    body.theme-light .glass-card:hover {
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.75), rgba(213, 232, 255, 0.55));
      border-color: rgba(16, 185, 129, 0.28);
      box-shadow: 0 20px 36px -24px rgba(16, 185, 129, 0.48);
    }

    body.theme-light .glass-panel {
      background:
        linear-gradient(132deg, rgba(255, 255, 255, 0.82), rgba(232, 242, 255, 0.68) 45%, rgba(236, 255, 247, 0.64)),
        var(--glass-bg);
      border-color: rgba(99, 102, 241, 0.2);
      box-shadow:
        0 20px 45px -28px rgba(59, 130, 246, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.75);
    }

    body.theme-light .animate-pulse-sos {
      animation: pulse-red 2s infinite ease-in-out;
      box-shadow: 0 0 0 1px rgba(255, 46, 46, 0.32), 0 18px 40px -30px rgba(255, 46, 46, 0.55);
    }

    .compose-panel {
      background:
        linear-gradient(145deg, rgba(12, 18, 34, 0.94), rgba(17, 28, 48, 0.9) 45%, rgba(12, 26, 32, 0.9)) !important;
      border: 1px solid rgba(148, 163, 184, 0.35) !important;
      box-shadow:
        0 24px 56px -28px rgba(0, 0, 0, 0.82),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(14px) saturate(135%);
    }

    .compose-field {
      background: linear-gradient(125deg, rgba(8, 12, 22, 0.86), rgba(13, 18, 30, 0.84)) !important;
      border-color: rgba(148, 163, 184, 0.3) !important;
      color: #f8fbff !important;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.05),
        inset 0 -8px 22px rgba(2, 6, 23, 0.35);
    }

    .compose-field::placeholder {
      color: rgba(226, 232, 240, 0.58) !important;
    }

    .compose-label-chip {
      background: rgba(5, 10, 20, 0.92) !important;
      border-color: rgba(148, 163, 184, 0.3) !important;
      color: #cbd5e1 !important;
    }

    .compose-sidecard {
      background: linear-gradient(150deg, rgba(10, 18, 34, 0.88), rgba(20, 28, 44, 0.82)) !important;
      border-color: rgba(148, 163, 184, 0.28) !important;
    }

    body.theme-light .compose-panel {
      background:
        linear-gradient(140deg, rgba(255, 255, 255, 0.98), rgba(245, 250, 255, 0.97) 50%, rgba(240, 255, 250, 0.96)),
        rgba(255, 255, 255, 0.98) !important;
      border-color: rgba(59, 130, 246, 0.22) !important;
      box-shadow:
        0 22px 52px -30px rgba(15, 23, 42, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px) saturate(115%);
    }

    body.theme-light .compose-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at 10% -20%, rgba(99, 102, 241, 0.08), transparent 42%),
                  radial-gradient(circle at 100% 10%, rgba(16, 185, 129, 0.07), transparent 38%);
      opacity: 0.55;
    }

    body.theme-light .compose-field {
      background: linear-gradient(120deg, rgba(255, 255, 255, 0.98), rgba(250, 253, 255, 0.97)) !important;
      border-color: rgba(99, 102, 241, 0.22) !important;
      color: #0b162c !important;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.96), 0 4px 14px -10px rgba(30, 64, 175, 0.18);
    }

    body.theme-light .compose-field::placeholder {
      color: rgba(30, 41, 59, 0.5) !important;
    }

    body.theme-light .compose-field:focus {
      border-color: rgba(99, 102, 241, 0.48) !important;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15), inset 0 1px 1px rgba(255, 255, 255, 0.86);
    }

    body.theme-light .compose-label-chip {
      background: rgba(255, 255, 255, 0.99) !important;
      border-color: rgba(71, 85, 105, 0.2) !important;
      box-shadow: 0 8px 18px -12px rgba(15, 23, 42, 0.22);
    }

    body.theme-light .compose-send-btn {
      box-shadow: 0 14px 36px -14px rgba(99, 102, 241, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.45) !important;
      letter-spacing: 0.02em;
    }

    body.theme-light .compose-sidecard {
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.95), rgba(236, 246, 255, 0.9)) !important;
      border-color: rgba(59, 130, 246, 0.2) !important;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.95), 0 14px 24px -20px rgba(15, 23, 42, 0.28);
    }

    body.theme-light .compose-panel .text-white\/30 { color: rgba(15, 23, 42, 0.52) !important; }
    body.theme-light .compose-panel .text-white\/20 { color: rgba(15, 23, 42, 0.42) !important; }
    body.theme-light .compose-panel .text-white\/40 { color: rgba(15, 23, 42, 0.62) !important; }

    body.theme-light .text-white { color: #0b162c !important; }
    body.theme-light .text-white\/90 { color: rgba(11, 22, 44, 0.9) !important; }
    body.theme-light .text-white\/70 { color: rgba(11, 22, 44, 0.72) !important; }
    body.theme-light .text-white\/60 { color: rgba(11, 22, 44, 0.62) !important; }
    body.theme-light .text-white\/50 { color: rgba(11, 22, 44, 0.55) !important; }
    body.theme-light .text-white\/40 { color: rgba(11, 22, 44, 0.46) !important; }
    body.theme-light .text-white\/30 { color: rgba(11, 22, 44, 0.38) !important; }
    body.theme-light .text-white\/20 { color: rgba(11, 22, 44, 0.3) !important; }
    body.theme-light .text-white\/10 { color: rgba(11, 22, 44, 0.2) !important; }
    body.theme-light .text-white\/5 { color: rgba(11, 22, 44, 0.16) !important; }

    body.theme-light .bg-white\/10 { background-color: rgba(11, 22, 44, 0.1) !important; }
    body.theme-light .bg-white\/5 { background-color: rgba(11, 22, 44, 0.07) !important; }
    body.theme-light .bg-white\/\[0\.05\] { background-color: rgba(11, 22, 44, 0.07) !important; }
    body.theme-light .bg-white\/\[0\.04\] { background-color: rgba(11, 22, 44, 0.055) !important; }
    body.theme-light .bg-white\/\[0\.03\] { background-color: rgba(11, 22, 44, 0.045) !important; }
    body.theme-light .bg-white\/\[0\.02\] { background-color: rgba(11, 22, 44, 0.04) !important; }
    body.theme-light .bg-\[\#06070a\] { background-color: rgba(255, 255, 255, 0.88) !important; }

    body.theme-light .border-white\/20 { border-color: rgba(11, 22, 44, 0.2) !important; }
    body.theme-light .border-white\/10 { border-color: rgba(11, 22, 44, 0.14) !important; }
    body.theme-light .border-white\/5 { border-color: rgba(11, 22, 44, 0.1) !important; }

    body.theme-light .from-\[\#08090d\],
    body.theme-light .via-\[\#08090d\] {
      --tw-gradient-from: rgba(248, 251, 255, 0.98) var(--tw-gradient-from-position) !important;
      --tw-gradient-to: rgba(248, 251, 255, 0) var(--tw-gradient-to-position) !important;
      --tw-gradient-stops: var(--tw-gradient-from), rgba(248, 251, 255, 0.9) var(--tw-gradient-via-position), var(--tw-gradient-to) !important;
    }

    body.theme-light .shadow-\[20px_0_60px_rgba\(0\,0\,0\,0\.5\)\] {
      box-shadow: 20px 0 60px rgba(8, 17, 36, 0.12) !important;
    }

    body.theme-light .shadow-\[0_60px_150px_-30px_rgba\(0\,0\,0\,1\)\] {
      box-shadow: 0 40px 100px -35px rgba(8, 17, 36, 0.28) !important;
    }

    body.theme-light .shadow-2xl {
      box-shadow: 0 20px 45px rgba(8, 17, 36, 0.15) !important;
    }

    body.theme-light .text-gradient {
      filter: saturate(130%) brightness(1.04);
    }

    body.theme-light .fill-white\/40 { fill: rgba(11, 22, 44, 0.46) !important; }
    body.theme-light .fill-black { fill: #081124 !important; }

    body.theme-light .from-blue-500\/5 {
      --tw-gradient-from: rgba(59, 130, 246, 0.18) var(--tw-gradient-from-position) !important;
      --tw-gradient-to: rgba(59, 130, 246, 0) var(--tw-gradient-to-position) !important;
      --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to) !important;
    }

    body.theme-light .from-red-500\/5 {
      --tw-gradient-from: rgba(255, 46, 46, 0.16) var(--tw-gradient-from-position) !important;
      --tw-gradient-to: rgba(255, 46, 46, 0) var(--tw-gradient-to-position) !important;
      --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to) !important;
    }

    body.theme-light .bg-white\/\[0\.04\].border-white\/10 {
      border-color: rgba(99, 102, 241, 0.22) !important;
    }

    body.theme-light .bg-white.text-black.scale-110 {
      background: linear-gradient(130deg, rgba(255, 255, 255, 0.96), rgba(225, 236, 255, 0.85)) !important;
      box-shadow: 0 12px 28px -16px rgba(99, 102, 241, 0.58) !important;
    }

    .message-card {
      content-visibility: auto;
      contain-intrinsic-size: 280px;
      contain: layout paint style;
    }

    .custom-scroll {
      -webkit-overflow-scrolling: touch;
      will-change: scroll-position;
    }
  </style>
